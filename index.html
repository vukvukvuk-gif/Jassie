<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For Jasmine 💖</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #06000a;
      color: #f0e8ff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, #1a0033 0%, #06000a 100%);
      z-index: -1;
    }

    h1 {
      font-size: 3.5rem;
      margin: 0.4em 0 0.8em;
      text-shadow: 0 0 20px rgba(255, 77, 166, 0.5);
      letter-spacing: -1px;
      user-select: none;
      text-align: center;
      padding: 0 20px;
      z-index: 5;
      font-weight: 300;
    }

    #input-area {
      position: relative;
      z-index: 5;
    }

    input {
      font-size: 2.5rem;
      padding: 0.5em 0.8em;
      width: 400px;
      max-width: 85vw;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      color: #fff;
      text-align: center;
      outline: none;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      backdrop-filter: blur(10px);
    }

    input:focus {
      border-color: #ff4da6;
      box-shadow: 0 0 40px rgba(255, 77, 166, 0.3), inset 0 0 15px rgba(255, 77, 166, 0.1);
      background: rgba(255, 77, 166, 0.05);
      transform: translateY(-5px);
    }

    #response {
      font-size: 5rem;
      font-weight: 900;
      margin: 0.8em 0;
      min-height: 1.2em;
      opacity: 0;
      transition: all 0.3s;
      z-index: 5;
      letter-spacing: 5px;
    }

    #response.show {
      opacity: 1;
      transform: scale(1.1);
    }

    #love-message {
      position: fixed;
      inset: 0;
      background: #06000a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.5s ease;
      z-index: 10;
    }

    #love-message.show {
      opacity: 1;
      pointer-events: all;
    }

    .text-container {
      text-align: center;
      margin-top: 1.5em;
      animation: fadeIn 3s ease 1s forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    #love-message h2 {
      font-size: 4.5rem;
      margin: 0;
      color: #fff;
      text-shadow: 0 0 20px #ff4da6, 0 0 40px #ff4da6;
      animation: pulse 3s infinite ease-in-out;
      padding: 0 20px;
      font-weight: 200;
      letter-spacing: 2px;
    }

    #love-message h3 {
      font-size: 1.2rem;
      margin-top: 15px;
      color: rgba(255, 255, 255, 0.65);
      font-weight: 300;
      letter-spacing: 2px;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50%      { transform: scale(1.05); opacity: 1; }
    }

    .heart-svg {
      width: 320px;
      height: 320px;
      filter: drop-shadow(0 0 30px rgba(255, 77, 166, 0.8));
    }

    .heart-path {
      fill: none;
      stroke: #ff4da6;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 1500;
      stroke-dashoffset: 1500;
    }

    .show .heart-path {
      animation: drawHeart 4.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes drawHeart {
      0% { stroke-dashoffset: 1500; fill: rgba(255, 77, 166, 0); }
      70% { stroke-dashoffset: 0; fill: rgba(255, 77, 166, 0); }
      100% { stroke-dashoffset: 0; fill: rgba(255, 77, 166, 1); }
    }

    #starsContainer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 11;
    }

    .flash-heart {
      position: absolute;
      color: #ff4da6;
      font-size: var(--size);
      opacity: 0;
      text-shadow: 0 0 10px #ff4da6;
      animation: flash var(--duration) ease-in-out infinite;
      animation-delay: var(--delay);
    }

    @keyframes flash {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 0.85; transform: scale(1.2); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    @media (max-width: 600px) {
      h1 { font-size: 2.2rem; }
      #love-message h2 { font-size: 2.5rem; }
      #love-message h3 { font-size: 0.9rem; }
      #response { font-size: 3rem; }
      input { font-size: 1.6rem; width: 280px; }
      .heart-svg { width: 220px; height: 220px; }
    }
  </style>
</head>
<body>

  <div id="starsContainer"></div>

  <h1>Hi what's ur name?</h1>

  <div id="input-area">
    <input type="text" id="nameInput" autocomplete="off" autofocus spellcheck="false" placeholder="Enter name..."/>
  </div>

  <div id="response"></div>

  <div id="love-message">
    <svg class="heart-svg" viewBox="0 0 200 200">
      <path class="heart-path" d="M100,180c-15-15-80-60-80-105c0-25,20-45,45-45c15,0,30,10,35,25c5-15,20-25,35-25c25,0,45,20,45,45C180,120,115,165,100,180z" />
    </svg>
    <div class="text-container">
      <h2>I love you Jasmine</h2>
      <h3>from your husband Vuk</h3>
    </div>
  </div>

  <script>
    const input   = document.getElementById('nameInput');
    const resp    = document.getElementById('response');
    const love    = document.getElementById('love-message');
    const starsContainer = document.getElementById('starsContainer');

    function createFlashingStars() {
      const count = 160; 
      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'flash-heart';
        star.innerHTML = '❤';
        
        const size = Math.random() * 10 + 4;
        const duration = Math.random() * 2 + 1; 
        const delay = Math.random() * 4;
        
        star.style.setProperty('--size', size + 'px');
        star.style.setProperty('--duration', duration + 's');
        star.style.setProperty('--delay', delay + 's');
        
        star.style.left = Math.random() * 100 + 'vw';
        star.style.top = Math.random() * 100 + 'vh';
        
        starsContainer.appendChild(star);
      }
    }

    function checkName() {
      const val = input.value.trim().toLowerCase();
      
      if (val === '') {
        resp.classList.remove('show');
        return;
      }

      if (val === 'jasmine') {
        resp.classList.remove('show');
        setTimeout(() => {
          love.classList.add('show');
          createFlashingStars();
        }, 300);
      } else {
        resp.textContent = 'EW';
        resp.style.color = '#ff3366';
        resp.classList.add('show');
        resp.style.animation = 'shake 0.4s ease';
        setTimeout(() => resp.style.animation = '', 400);
      }
    }

    input.addEventListener('keydown', (e) => {
      if (resp.classList.contains('show')) {
        resp.classList.remove('show');
      }

      if (e.key === 'Enter') {
        e.preventDefault();
        checkName();
      }
    });

    document.addEventListener('click', () => {
      if (!love.classList.contains('show')) input.focus();
    });
    window.addEventListener('load', () => input.focus());
  </script>

</body>
</html>
