<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For Jasmine 💖</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #0f001a;
      color: #f0e8ff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    h1 {
      font-size: 4.8rem;
      margin: 0.4em 0 0.8em;
      text-shadow: 0 0 30px #ff4da6;
      letter-spacing: -1px;
      user-select: none;
    }

    #input-area {
      position: relative;
    }

    input {
      font-size: 3.2rem;
      padding: 0.4em 0.6em;
      width: 380px;
      max-width: 85vw;
      background: rgba(255,255,255,0.07);
      border: 2px solid #66339944;
      border-radius: 16px;
      color: #fff;
      text-align: center;
      outline: none;
      transition: all 0.25s;
    }

    input:focus {
      border-color: #ff4da6;
      box-shadow: 0 0 30px #ff4da688;
      background: rgba(255,77,166,0.08);
    }

    #response {
      font-size: 6rem;
      font-weight: bold;
      margin: 1.2em 0 0.4em;
      min-height: 1.2em;
      opacity: 0;
      transition: opacity 0.4s;
    }

    #response.show {
      opacity: 1;
    }

    #love-message {
      position: fixed;
      inset: 0;
      background: #0f001a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.2s;
      z-index: 10;
    }

    #love-message.show {
      opacity: 1;
      pointer-events: all;
    }

    #love-message h2 {
      font-size: 5.5rem;
      margin: 0 0 0.8em;
      color: #ff4da6;
      text-shadow: 0 0 40px #ff4da6, 0 0 80px #c71585;
      animation: pulse 2.5s infinite ease-in-out;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50%     { transform: scale(1.08); }
    }

    .heart {
      position: absolute;
      width: 120px;
      height: 110px;
      transform: translate(-50%, -50%);
      opacity: 0;
      animation: heartAppear 2.8s forwards;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 120px;
      height: 190px;
      background: #ff4da6;
      border-radius: 120px 120px 0 0;
      transform-origin: bottom center;
    }

    .heart::before {
      transform: rotate(-45deg) translateX(50%);
      box-shadow: 0 0 60px #ff4da6aa;
    }

    .heart::after {
      transform: rotate(45deg) translateX(-50%);
      box-shadow: 0 0 60px #ff4da6aa;
    }

    @keyframes heartAppear {
      0%   { transform: translate(-50%, -50%) scale(0.1) rotate(-30deg); opacity: 0; }
      40%  { transform: translate(-50%, -50%) scale(1.4) rotate(20deg);  opacity: 1; }
      60%  { transform: translate(-50%, -50%) scale(0.9) rotate(-10deg); }
      80%  { transform: translate(-50%, -50%) scale(1.15) rotate(5deg);  }
      100% { transform: translate(-50%, -50%) scale(1)   rotate(0deg);   opacity: 1; }
    }

    /* floating hearts background when success */
    .heart-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      opacity: 0;
      transition: opacity 1.5s 1s;
    }

    .heart-bg.show {
      opacity: 0.6;
    }

    .float-heart {
      position: absolute;
      font-size: 3rem;
      color: #ff4da6;
      animation: floatUp linear forwards;
      user-select: none;
      pointer-events: none;
    }

    @keyframes floatUp {
      to {
        transform: translateY(-120vh) rotate(720deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <h1>Hi what's ur name?</h1>

  <div id="input-area">
    <input type="text" id="nameInput" autocomplete="off" autofocus spellcheck="false"/>
  </div>

  <div id="response"></div>

  <div id="love-message">
    <div class="heart" style="left:50%; top:38%;"></div>
    <h2>Vuk loves you Jasmine</h2>
  </div>

  <div class="heart-bg" id="heartBg"></div>

  <script>
    const input  = document.getElementById('nameInput');
    const resp   = document.getElementById('response');
    const love   = document.getElementById('love-message');
    const heartBg = document.getElementById('heartBg');

    input.addEventListener('input', () => {
      const val = input.value.trim().toLowerCase();

      if (val === '') {
        resp.classList.remove('show');
        resp.textContent = '';
        return;
      }

      if (val === 'jasmine') {
        // success path
        resp.classList.remove('show');
        setTimeout(() => {
          love.classList.add('show');
          heartBg.classList.add('show');
          startFloatingHearts();
        }, 300);
      } else {
        // wrong name
        resp.textContent = 'EW';
        resp.style.color = '#ff3366';
        resp.classList.add('show');
      }
    });

    input.addEventListener('keypress', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
      }
    });

    function startFloatingHearts() {
      const interval = setInterval(() => {
        if (!love.classList.contains('show')) {
          clearInterval(interval);
          return;
        }

        const heart = document.createElement('div');
        heart.className = 'float-heart';
        heart.textContent = '💗';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = (Math.random() * 6 + 8) + 's';
        heart.style.opacity = Math.random() * 0.5 + 0.4;
        heart.style.fontSize = (Math.random() * 1.8 + 1.8) + 'rem';

        heartBg.appendChild(heart);

        setTimeout(() => heart.remove(), 14000);
      }, 420);
    }

    // optional: refocus on load / click anywhere
    document.addEventListener('click', () => input.focus());
    window.addEventListener('load', () => input.focus());
  </script>

</body>
</html>
